<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>王者荣耀 · 英雄战力查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0b1a2f 0%, #1a2f3f 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(255, 215, 150, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(100, 180, 255, 0.1) 0%, transparent 45%);
      pointer-events: none; z-index: 0;
    }
    .container {
      width: 100%; max-width: 550px;
      background: rgba(18, 28, 46, 0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(255, 200, 100, 0.2);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(210, 180, 140, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 28px 22px 35px;
      position: relative; z-index: 2;
    }
    .title-section { text-align: center; margin-bottom: 25px; }
    .title {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(180deg, #f9e076 0%, #e0a83c 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 4px;
      margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .subtitle { color: #b9c8e0; font-size: 0.9rem; letter-spacing: 2px; opacity: 0.9; margin-top: -5px; }
    
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      color: #c0b280;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 6px;
      margin-left: 10px;
    }
    .input-field, .select-field {
      width: 100%;
      background: rgba(10,20,35,0.7);
      border: none;
      padding: 14px 20px;
      border-radius: 50px;
      font-size: 1rem;
      color: #f0e6c5;
      outline: none;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: 1px solid transparent;
      transition: all 0.2s;
      appearance: none;
      -webkit-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="%23c0b280"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 18px;
    }
    .input-field { background-image: none; }
    .input-field::placeholder { color: #6b7b94; font-weight: 400; }
    .input-field:focus, .select-field:focus {
      border-color: #e5b567;
      background-color: rgba(18,28,44,0.9);
      box-shadow: 0 0 15px rgba(230,180,60,0.3);
      color: #ffefc0;
    }

    .search-btn {
      width: 100%;
      background: radial-gradient(circle at 30% 30%, #f5cb6b, #b2751a);
      border: none;
      border-radius: 50px;
      padding: 15px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #0b1420;
      letter-spacing: 3px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 8px 18px rgba(180,120,20,0.45);
      border: 1px solid rgba(255,215,0,0.5);
      margin-top: 10px;
      margin-bottom: 20px;
    }
    .search-btn:hover { transform: scale(1.02); background: radial-gradient(circle at 30% 30%, #ffdf85, #c68b2c); box-shadow: 0 10px 22px rgba(240,170,30,0.7); }
    .search-btn:active { transform: scale(0.98); }

    /* 英雄信息卡片 */
    .hero-card {
      background: rgba(8,18,30,0.7);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(220,180,80,0.25);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-avatar {
      width: 70px; height: 70px;
      border-radius: 18px;
      border: 2px solid #c9a44b;
      object-fit: cover;
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
      background: linear-gradient(135deg,#2a3f55,#0e1a28);
      min-width: 70px;
    }
    .hero-info { flex: 1; }
    .hero-name { font-size: 1.5rem; font-weight: 700; color: #ffe7aa; }
    .hero-meta { color: #b9ad82; font-size: 0.85rem; margin-top: 4px; }
    .hero-tag {
      display: inline-block;
      background: rgba(200,160,60,0.2);
      border: 1px solid rgba(200,160,60,0.4);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      color: #e5b567;
      margin-right: 6px;
      margin-top: 4px;
    }

    /* 战力摘要 */
    .power-summary {
      background: rgba(20,30,45,0.7);
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(200,160,60,0.3);
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
    .summary-item { flex: 1; }
    .summary-label { font-size: 0.7rem; color: #9aa9c1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .summary-value { font-size: 1.4rem; font-weight: 800; color: #fad974; text-shadow: 0 0 10px #b57c10; }

    /* 地区列表 */
    .area-list-title {
      color: #c0b280;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
      padding-left: 5px;
    }
    .area-list {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 16px;
      background: rgba(8,18,30,0.5);
    }
    .area-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,215,100,0.08);
      transition: background 0.2s;
    }
    .area-item:hover { background: rgba(255,215,100,0.05); }
    .area-item:last-child { border-bottom: none; }
    
    .area-rank {
      width: 32px;
      font-weight: 700;
      color: #9aa9c1;
      font-size: 0.85rem;
      text-align: center;
    }
    .area-rank.top3 { color: #fad974; font-size: 1rem; }
    .area-name {
      flex: 1;
      color: #eae2c6;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0 8px;
    }
    .area-full-name {
      color: #7f8b9f;
      font-size: 0.75rem;
      margin-left: 4px;
    }
    .area-power {
      font-weight: 700;
      color: #fad974;
      font-size: 1rem;
      text-shadow: 0 0 8px rgba(180,120,20,0.5);
      white-space: nowrap;
    }
    
    .medal { margin-right: 2px; }
    .medal-1 { color: #ffd700; }
    .medal-2 { color: #c0c0c0; }
    .medal-3 { color: #cd7f32; }

    .error-message { background: rgba(180,60,60,0.2); border: 1px solid #cf6e6e; color: #ffc3c3; padding: 18px; border-radius: 24px; text-align: center; }
    .loading-text { text-align: center; padding: 25px; color: #d4b26a; }
    .hidden { display: none; }
    .hint-text { font-size: 0.7rem; color: #6f7d91; margin-left: 10px; margin-top: -5px; margin-bottom: 10px; }
    .update-time { text-align: right; font-size: 0.65rem; color: #7f8b9f; margin-top: 8px; }
    
    /* 当前榜单提示 */
    .current-badge {
      display: inline-block;
      background: linear-gradient(135deg, #c9a44b, #8b6914);
      color: #0b1420;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 3px 12px;
      border-radius: 12px;
      letter-spacing: 1px;
    }
    
    .province-list::-webkit-scrollbar { width: 4px; }
    .province-list::-webkit-scrollbar-track { background: transparent; }
    .province-list::-webkit-scrollbar-thumb { background: rgba(200,160,60,0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-section">
      <div class="title">⚔️ 王者战力 ⚔️</div>
      <div class="subtitle">全国最低上榜战力查询</div>
    </div>

    <div class="form-group">
      <label class="form-label">🏹 英雄名称</label>
      <input type="text" id="heroNameInput" class="input-field" placeholder="请输入英雄名，如 孙悟空" autocomplete="off" autofocus value="孙悟空">
    </div>

    <div class="form-group">
      <label class="form-label">📱 大区选择</label>
      <select id="typeSelect" class="select-field">
        <option value="0">安卓 QQ 大区</option>
        <option value="1" selected>安卓 微信 大区</option>
        <option value="2">苹果 QQ 大区</option>
        <option value="3">苹果 微信 大区</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">🏆 榜单类型</label>
      <select id="areaTypeSelect" class="select-field">
        <option value="0" selected>全国最低省榜</option>
        <option value="1">全国最低市榜</option>
        <option value="2">全国最低区榜</option>
      </select>
    </div>

    <button id="searchBtn" class="search-btn">🔍 查 询 战 力</button>
    <div class="hint-text" id="hintText">* 当前查询：省榜 — 显示各省最低上榜战力</div>

    <!-- 结果区域 -->
    <div id="resultContainer" class="hidden"></div>
    <div id="statusMessage" class="hidden"></div>
  </div>

  <script>
    (function() {
      const CORS_PROXY = 'https://corsproxy.io/?';
      const API_ORIGIN = 'https://api.key5.site/API/king/new/index.php';
      const API_KEY = '50e7099a396e7cefcba6a5f1170f01a152334cd1bb36610d916c31cc1abb5819';

      const heroNameInput = document.getElementById('heroNameInput');
      const typeSelect = document.getElementById('typeSelect');
      const areaTypeSelect = document.getElementById('areaTypeSelect');
      const searchBtn = document.getElementById('searchBtn');
      const resultContainer = document.getElementById('resultContainer');
      const statusMessage = document.getElementById('statusMessage');
      const hintText = document.getElementById('hintText');

      function hide(el) { el?.classList.add('hidden'); }
      function show(el) { el?.classList.remove('hidden'); }

      function clearAll() {
        hide(statusMessage); hide(resultContainer);
        if(statusMessage) statusMessage.innerHTML = '';
        if(resultContainer) resultContainer.innerHTML = '';
      }

      function showLoading() {
        clearAll();
        if(statusMessage) {
          statusMessage.innerHTML = '<div class="loading-text">⏳ 正在查询战力数据...</div>';
          show(statusMessage);
        }
      }

      function showError(msg) {
        clearAll();
        if(statusMessage) {
          statusMessage.innerHTML = `<div class="error-message">⚠️ ${escapeHtml(msg)}</div>`;
          show(statusMessage);
        }
      }

      function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function formatType(val) {
        const map = { '0': '安卓QQ', '1': '安卓微信', '2': '苹果QQ', '3': '苹果微信' };
        return map[val] || val;
      }

      // 获取榜单类型信息
      function getAreaTypeInfo(val) {
        const map = {
          '0': { name: '省榜', label: '省份', field: 'provinceName', emptyField: 'cityName' },
          '1': { name: '市榜', label: '城市', field: 'cityName', emptyField: 'provinceName' },
          '2': { name: '区榜', label: '区县', field: 'countyName', emptyField: 'cityName' }
        };
        return map[val] || map['0'];
      }

      function getMedal(index) {
        if (index === 0) return '<span class="medal medal-1">🥇</span>';
        if (index === 1) return '<span class="medal medal-2">🥈</span>';
        if (index === 2) return '<span class="medal medal-3">🥉</span>';
        return '';
      }

      // 根据榜单类型获取显示名称
      function getDisplayName(item, areaType) {
        const info = getAreaTypeInfo(areaType);
        const primaryName = item[info.field] || '';
        let secondaryName = '';
        
        if (areaType === '1') {
          // 市榜：显示 "城市名, 省份名"
          secondaryName = item.provinceName || '';
        } else if (areaType === '2') {
          // 区榜：显示 "区县名, 城市名"
          secondaryName = item.cityName || '';
        }
        
        return { primary: primaryName, secondary: secondaryName };
      }

      function renderResult(heroData, provinceList, updateTime) {
        const heroName = heroData.heroName || '未知英雄';
        const heroAvatar = heroData.heroPortraitUrl || '';
        const areaType = areaTypeSelect.value;
        const areaInfo = getAreaTypeInfo(areaType);

        // 按战力值降序排序
        const sorted = [...provinceList].sort((a, b) => b.value - a.value);
        
        // 统计数据
        const minPower = sorted[sorted.length - 1]?.value || 0;
        const maxPower = sorted[0]?.value || 0;
        const avgPower = Math.round(sorted.reduce((sum, item) => sum + item.value, 0) / sorted.length);

        // 榜单标题
        const listTitle = `🏆 各${areaInfo.label}最低上榜战力排行`;

        let html = `
          <!-- 英雄信息 -->
          <div class="hero-card">
            ${heroAvatar ? `<img src="${escapeHtml(heroAvatar)}" class="hero-avatar" alt="${escapeHtml(heroName)}" onerror="this.style.display='none'">` : ''}
            <div class="hero-info">
              <div class="hero-name">${escapeHtml(heroName)}</div>
              <div class="hero-meta">
                ${formatType(typeSelect.value)} · <span class="current-badge">${areaInfo.name}</span>
              </div>
              <span class="hero-tag">${sorted.length}个${areaInfo.label}</span>
            </div>
          </div>

          <!-- 战力摘要 -->
          <div class="power-summary">
            <div class="summary-item">
              <div class="summary-label">📈 最高上榜战力</div>
              <div class="summary-value">${maxPower.toLocaleString()}</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">📉 最低上榜战力</div>
              <div class="summary-value">${minPower.toLocaleString()}</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">📊 平均战力</div>
              <div class="summary-value">${avgPower.toLocaleString()}</div>
            </div>
          </div>

          <!-- 地区列表 -->
          <div class="area-list-title">${listTitle}</div>
          <div class="area-list">
        `;

        sorted.forEach((item, index) => {
          const rankClass = index < 3 ? ' top3' : '';
          const display = getDisplayName(item, areaType);
          
          let nameHtml = escapeHtml(display.primary);
          if (display.secondary) {
            nameHtml += `<span class="area-full-name">${escapeHtml(display.secondary)}</span>`;
          }
          if (!display.primary) {
            nameHtml = '<span style="color:#6b7b94;">未知地区</span>';
          }
          
          html += `
            <div class="area-item">
              <span class="area-rank${rankClass}">${getMedal(index)}${index + 1}</span>
              <span class="area-name">${nameHtml}</span>
              <span class="area-power">${item.value.toLocaleString()}</span>
            </div>
          `;
        });

        html += `</div>`;
        
        if (updateTime) {
          html += `<div class="update-time">🕒 数据更新于 ${escapeHtml(updateTime)}</div>`;
        }

        resultContainer.innerHTML = html;
        show(resultContainer);
        hide(statusMessage);
      }

      // 更新提示文字
      function updateHint() {
        const areaType = areaTypeSelect.value;
        const hints = {
          '0': '* 当前查询：省榜 — 显示各省最低上榜战力',
          '1': '* 当前查询：市榜 — 显示各市最低上榜战力',
          '2': '* 当前查询：区榜 — 显示各区县最低上榜战力'
        };
        hintText.textContent = hints[areaType] || hints['0'];
      }

      async function performSearch() {
        const heroName = heroNameInput.value.trim();
        if (!heroName) {
          showError('请输入英雄名称');
          return;
        }

        showLoading();

        const type = typeSelect.value;
        const areaType = areaTypeSelect.value;

        const params = new URLSearchParams();
        params.append('apikey', API_KEY);
        params.append('heroname', heroName);
        params.append('heroName', heroName);
        params.append('type', type);
        params.append('areaType', areaType);
        
        const targetUrl = `${API_ORIGIN}?${params.toString()}`;
        const url = CORS_PROXY ? `${CORS_PROXY}${encodeURIComponent(targetUrl)}` : targetUrl;

        console.log('📡 请求URL:', targetUrl);
        console.log('📋 榜单类型:', getAreaTypeInfo(areaType).name);

        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`服务器响应异常 (${resp.status})`);

          const data = await resp.json();
          console.log('📦 接口返回:', data);

          if (data.code !== 200) {
            throw new Error(data.msg || `接口返回错误码: ${data.code}`);
          }

          const heroData = data.data;
          const provinceList = heroData?.list || [];
          const updateTime = data.ut || '';

          if (!heroData || provinceList.length === 0) {
            const areaInfo = getAreaTypeInfo(areaType);
            showError(`未查询到${areaInfo.name}数据，请检查英雄名称或更换大区/榜单类型`);
            return;
          }

          renderResult(heroData, provinceList, updateTime);
          
        } catch (e) {
          console.error('❌ 查询失败:', e);
          if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
            showError('网络连接失败，请检查网络或CORS代理');
          } else {
            showError(e.message);
          }
        }
      }

      // 事件绑定
      searchBtn.addEventListener('click', performSearch);
      heroNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          performSearch();
        }
      });

      // 切换榜单类型时更新提示
      areaTypeSelect.addEventListener('change', updateHint);

      // 初始状态
      clearAll();
      updateHint();
    })();
  </script>
</body>
</html>
