<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者荣耀英雄战力查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .query-form {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        .btn-search:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-info {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .hero-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-right: 20px;
        }

        .hero-details {
            flex: 1;
        }

        .hero-name {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .hero-title {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .hero-type {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .rank-section {
            margin-bottom: 30px;
        }

        .rank-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .rank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .rank-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .rank-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .rank-card .rank-level {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .rank-card .rank-value {
            font-size: 1.5em;
            color: #667eea;
            font-weight: 700;
        }

        .rank-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .rank-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .rank-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .rank-item .rank-name {
            font-size: 1em;
            color: #333;
            margin-bottom: 5px;
        }

        .rank-item .rank-power {
            font-size: 1.2em;
            color: #667eea;
            font-weight: 600;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1.1em;
        }

        .update-time {
            text-align: right;
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            padding: 10px 25px;
            background: #f8f9fa;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab:hover:not(.active) {
            background: #e9ecef;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .hero-info {
                flex-direction: column;
                text-align: center;
            }

            .hero-avatar {
                margin-right: 0;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 王者荣耀英雄战力查询</h1>
            <p>实时查询全国/省/市/区各级战力排名数据</p>
        </div>

        <div class="query-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="heroName">英雄名称</label>
                    <input type="text" id="heroName" placeholder="请输入英雄名称（如：李白、貂蝉）" list="heroList">
                    <datalist id="heroList">
                        <option value="亚瑟"></option>
                        <option value="后羿"></option>
                        <option value="安琪拉"></option>
                        <option value="妲己"></option>
                        <option value="妲己"></option>
                        <option value="李白"></option>
                        <option value="貂蝉"></option>
                        <option value="韩信"></option>
                        <option value="孙悟空"></option>
                        <option value="鲁班七号"></option>
                    </datalist>
                </div>

                <div class="form-group">
                    <label for="platform">平台区服</label>
                    <select id="platform">
                        <option value="aqq">安卓 QQ</option>
                        <option value="awx">安卓 微信</option>
                        <option value="iqq">iOS QQ</option>
                        <option value="iwx">iOS 微信</option>
                    </select>
                </div>
            </div>

            <button class="btn-search" id="searchBtn" onclick="searchHeroPower()">🔍 查询战力</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在查询英雄战力数据...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="hero-info">
                <img class="hero-avatar" id="heroAvatar" src="" alt="英雄头像">
                <div class="hero-details">
                    <div class="hero-name" id="heroNameDisplay"></div>
                    <div class="hero-title" id="heroTitle"></div>
                    <span class="hero-type" id="heroType"></span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('province')">省级金牌</button>
                <button class="tab" onclick="switchTab('city')">市级银牌</button>
                <button class="tab" onclick="switchTab('county')">县级铜牌</button>
            </div>

            <div id="provinceTab" class="tab-content active">
                <div class="rank-section">
                    <div class="rank-title">🏆 全国排名参考</div>
                    <div class="rank-grid">
                        <div class="rank-card">
                            <div class="rank-level">全国前10名战力</div>
                            <div class="rank-value" id="top10Power">-</div>
                        </div>
                        <div class="rank-card">
                            <div class="rank-level">全国前100名战力</div>
                            <div class="rank-value" id="top100Power">-</div>
                        </div>
                    </div>
                </div>

                <div class="rank-section">
                    <div class="rank-title">🥇 省级金牌称号最低战力（前10省份）</div>
                    <div class="rank-list" id="provinceList"></div>
                </div>
            </div>

            <div id="cityTab" class="tab-content">
                <div class="rank-section">
                    <div class="rank-title">🥈 市级银牌称号最低战力（前10城市）</div>
                    <div class="rank-list" id="cityList"></div>
                </div>
            </div>

            <div id="countyTab" class="tab-content">
                <div class="rank-section">
                    <div class="rank-title">🥉 县级铜牌称号最低战力（前10区县）</div>
                    <div class="rank-list" id="countyList"></div>
                </div>
            </div>

            <div class="update-time" id="updateTime"></div>
        </div>
    </div>

    <script>
        // 使用 CORS 代理来绕过跨域问题
        const API_BASE_URL = 'https://api.wzryqz.cn/gethero';
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

        async function searchHeroPower() {
            const heroName = document.getElementById('heroName').value.trim();
            const platform = document.getElementById('platform').value;

            if (!heroName) {
                showError('请输入英雄名称');
                return;
            }

            showLoading(true);
            hideError();
            hideResult();

            try {
                // 先尝试直接请求
                let url = `${API_BASE_URL}?hero=${encodeURIComponent(heroName)}&type=${platform}`;
                let response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    },
                    mode: 'cors'
                });

                // 如果直接请求失败，尝试使用代理
                if (!response.ok) {
                    console.log('直接请求失败，尝试使用代理...');
                    const proxyUrl = CORS_PROXY + encodeURIComponent(url);
                    response = await fetch(proxyUrl, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                        }
                    });
                }

                if (!response.ok) {
                    throw new Error(`请求失败: ${response.status}`);
                }

                const data = await response.json();

                if (!data) {
                    throw new Error('返回数据为空');
                }

                // 兼容不同的返回格式
                if (data.code !== undefined && data.code !== 200) {
                    throw new Error(data.msg || '查询失败，请检查英雄名称是否正确');
                }

                displayResult(data);
            } catch (error) {
                console.error('查询错误:', error);
                // 提供更详细的错误信息
                let errorMsg = `查询失败: ${error.message}`;
                if (error.message.includes('fetch')) {
                    errorMsg = '网络请求失败，可能是跨域限制。建议：1. 使用本地服务器运行 2. 检查网络连接 3. 稍后重试';
                }
                showError(errorMsg);
            } finally {
                showLoading(false);
            }
        }

        function displayResult(data) {
            const heroData = data;

            // 设置英雄基本信息
            document.getElementById('heroNameDisplay').textContent = heroData.name || heroData.hero?.name || '未知英雄';
            document.getElementById('heroTitle').textContent = heroData.title || heroData.hero?.title || '';
            document.getElementById('heroType').textContent = heroData.hero_type || heroData.hero?.type || '未知';

            // 设置英雄头像
            const avatarUrl = heroData.photo || heroData.hero?.avatar || '';
            if (avatarUrl) {
                document.getElementById('heroAvatar').src = avatarUrl;
                document.getElementById('heroAvatar').style.display = 'block';
            } else {
                document.getElementById('heroAvatar').style.display = 'none';
            }

            // 设置全国排名数据
            document.getElementById('top10Power').textContent = heroData.Top10 || heroData.rank_data?.extreme?.top10 || '-';
            document.getElementById('top100Power').textContent = heroData.Top100 || heroData.rank_data?.extreme?.top100 || '-';

            // 设置省市区数据
            renderRankList('provinceList', heroData.province || heroData.rank_data?.province || [], '省');
            renderRankList('cityList', heroData.city || heroData.rank_data?.city || [], '市');
            renderRankList('countyList', heroData.county || heroData.rank_data?.district || [], '区');

            // 设置更新时间
            const updateTime = heroData.updatetime || heroData.syn_date || '';
            if (updateTime) {
                document.getElementById('updateTime').textContent = `数据更新时间: ${updateTime}`;
            }

            showResult();
        }

        function renderRankList(containerId, rankData, suffix) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (!rankData || rankData.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">暂无数据</p>';
                return;
            }

            rankData.forEach((item, index) => {
                const name = item.loc || item.name || '未知地区';
                const value = item.val || item.power || 0;

                const rankItem = document.createElement('div');
                rankItem.className = 'rank-item';
                rankItem.innerHTML = `
                    <div class="rank-name">${index + 1}. ${name}</div>
                    <div class="rank-power">${value} 战力</div>
                `;
                container.appendChild(rankItem);
            });
        }

        function switchTab(tabName) {
            // 更新tab按钮状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // 更新内容区域状态
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`${tabName}Tab`).classList.add('active');
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            const searchBtn = document.getElementById('searchBtn');

            if (show) {
                loading.classList.add('show');
                searchBtn.disabled = true;
            } else {
                loading.classList.remove('show');
                searchBtn.disabled = false;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            // 3秒后自动隐藏错误信息
            setTimeout(() => {
                hideError();
            }, 5000);
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        function showResult() {
            document.getElementById('resultContainer').classList.add('show');
        }

        function hideResult() {
            document.getElementById('resultContainer').classList.remove('show');
        }

        // 绑定回车键事件
        document.getElementById('heroName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchHeroPower();
            }
        });

        // 页面加载时获取焦点
        document.getElementById('heroName').focus();
    </script>
</body>
</html>
