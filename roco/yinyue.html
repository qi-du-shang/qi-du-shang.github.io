<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器 - 仿写博客园音乐模块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .demo-content {
            text-align: center;
            margin-bottom: 30px;
        }

        .demo-content h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .demo-content p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* ==================== 播放器容器（居中） ==================== */
        .player-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ==================== 歌词显示区域（播放器下方，透明背景） ==================== */
        .lyrics-display {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 20px;
            text-align: center;
            width: 400px;
            max-width: 90vw;
            pointer-events: none;
            display: none;
        }

        .lyrics-display.show {
            display: block;
        }

        .lyrics-content {
            position: relative;
            height: 120px;
            overflow: hidden;
        }

        .lyrics-wrapper {
            transition: transform 0.3s ease;
        }

        .lyric-line {
            padding: 8px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .lyric-line.active {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .lyrics-empty {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            padding: 20px 0;
        }

        /* ==================== 音乐播放器样式 ==================== */
        .music-player {
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 收起状态 - 圆形头像 */
        .player-mini {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            transition: all 0.3s ease;
        }

        .player-mini:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        .player-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-mini .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-mini:hover .play-btn {
            opacity: 1;
        }

        .player-mini.playing img {
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 展开按钮 */
        .toggle-btn {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 48px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            color: #666;
            font-size: 14px;
        }

        .toggle-btn:hover {
            background: #fff;
            color: #2d8cf0;
        }

        /* 展开状态 - 完整播放器 */
        .player-full {
            width: 340px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: none;
        }

        .player-full.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 播放器主体 */
        .player-body {
            display: flex;
            padding: 16px;
        }

        .player-cover {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 16px;
        }

        .player-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-cover.playing img {
            animation: rotate 20s linear infinite;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .song-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }

        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(90deg, #2d8cf0, #57a3f3);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-bar .progress::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #2d8cf0;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar:hover .progress::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #999;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 16px;
        }

        .control-btns {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: #f0f0f0;
            color: #2d8cf0;
        }

        .control-btn.play {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2d8cf0, #57a3f3);
            color: #fff;
            font-size: 16px;
        }

        .control-btn.play:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(45, 140, 240, 0.4);
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #666;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .volume-slider {
            width: 50px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-slider .volume-bar {
            height: 100%;
            background: #2d8cf0;
            border-radius: 2px;
            width: 70%;
        }

        /* 功能按钮 */
        .func-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #666;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .func-btn:hover {
            background: #f0f0f0;
            color: #2d8cf0;
        }

        .func-btn.active {
            color: #2d8cf0;
            background: #e8f4fd;
        }

        /* 播放列表 */
        .playlist {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            border-top: 1px solid #f0f0f0;
        }

        .playlist.show {
            max-height: 220px;
            overflow-y: auto;
        }

        .playlist ul {
            list-style: none;
        }

        .playlist li {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s ease;
            border-bottom: 1px solid #f8f8f8;
        }

        .playlist li:hover {
            background: #f8f9fa;
        }

        .playlist li.active {
            background: #e8f4fd;
            color: #2d8cf0;
        }

        .playlist li .song-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .playlist li .index {
            font-size: 12px;
            color: #999;
            width: 20px;
            text-align: center;
        }

        .playlist li.active .index {
            color: #2d8cf0;
        }

        .playlist li .title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .playlist li .artist {
            font-size: 11px;
            color: #999;
        }

        .playlist li .duration {
            font-size: 11px;
            color: #999;
            flex-shrink: 0;
        }

        /* 自定义滚动条 */
        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .playlist::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* 樱花飘落效果 */
        .sakura {
            position: fixed;
            top: -10px;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .player-full {
                width: 100%;
                max-width: 340px;
            }

            .lyrics-display {
                width: 100%;
            }

            .demo-content h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        // DOM元素
        const audio = document.getElementById('audio');
        const playerMini = document.getElementById('playerMini');
        const miniPlayBtn = document.getElementById('miniPlayBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const playerFull = document.getElementById('playerFull');
        const playerCover = document.getElementById('playerCover');
        const coverImg = document.getElementById('coverImg');
        const songName = document.getElementById('songName');
        const artistName = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeBar = document.getElementById('volumeBar');
        const playlistToggle = document.getElementById('playlistToggle');
        const playlist = document.getElementById('playlist');
        const playlistUl = document.getElementById('playlistUl');
        const lyricsBtn = document.getElementById('lyricsBtn');
        const lyricsDisplay = document.getElementById('lyricsDisplay');
        const lyricsWrapper = document.getElementById('lyricsWrapper');

        // 状态变量
        let currentIndex = 0;
        let isPlaying = false;
        let isExpanded = false;
        let playMode = 0; // 0: 列表循环, 1: 单曲循环, 2: 随机播放
        const modeIcons = ['🔁', '🔂', '🔀'];
        let currentVolume = 0.7;
        let isMuted = false;
        let showLyrics = false;
        let currentLyrics = [];
        let currentLyricIndex = -1;

        // 解析LRC歌词
        function parseLyrics(lrcString) {
            if (!lrcString) return [];
            
            const lines = lrcString.split('\n');
            const lyrics = [];
            
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;
            
            lines.forEach(line => {
                const matches = [...line.matchAll(timeRegex)];
                if (matches.length > 0) {
                    const text = line.replace(timeRegex, '').trim();
                    if (text) {
                        matches.forEach(match => {
                            const minutes = parseInt(match[1]);
                            const seconds = parseInt(match[2]);
                            const milliseconds = parseInt(match[3].padEnd(3, '0'));
                            const time = minutes * 60 + seconds + milliseconds / 1000;
                            lyrics.push({ time, text });
                        });
                    }
                }
            });
            
            // 按时间排序
            lyrics.sort((a, b) => a.time - b.time);
            return lyrics;
        }

        // 渲染歌词
        function renderLyrics() {
            const music = musicList[currentIndex];
            currentLyrics = parseLyrics(music.lyrics);
            currentLyricIndex = -1;
            
            if (currentLyrics.length === 0) {
                lyricsWrapper.innerHTML = '<div class="lyrics-empty">暂无歌词</div>';
                return;
            }
            
            lyricsWrapper.innerHTML = currentLyrics.map((lyric, index) => 
                `<div class="lyric-line" data-index="${index}">${lyric.text}</div>`
            ).join('');
            
            // 重置位置
            lyricsWrapper.style.transform = 'translateY(0)';
        }

        // 更新歌词高亮和滚动
        function updateLyrics(currentTime) {
            if (currentLyrics.length === 0 || !showLyrics) return;
            
            let newIndex = -1;
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time) {
                    newIndex = i;
                } else {
                    break;
                }
            }
            
            if (newIndex !== currentLyricIndex) {
                currentLyricIndex = newIndex;
                
                // 更新高亮
                const lines = lyricsWrapper.querySelectorAll('.lyric-line');
                lines.forEach((line, index) => {
                    line.classList.toggle('active', index === currentLyricIndex);
                });
                
                // 滚动到当前行（居中显示）
                if (currentLyricIndex >= 0 && lines[currentLyricIndex]) {
                    const activeLine = lines[currentLyricIndex];
                    const containerHeight = 120; // 歌词区域高度
                    const lineTop = activeLine.offsetTop;
                    const lineHeight = activeLine.offsetHeight;
                    const translateY = -(lineTop - containerHeight / 2 + lineHeight / 2);
                    lyricsWrapper.style.transform = `translateY(${translateY}px)`;
                }
            }
        }

        // 切换歌词显示
        function toggleLyrics() {
            showLyrics = !showLyrics;
            lyricsBtn.classList.toggle('active', showLyrics);
            lyricsDisplay.classList.toggle('show', showLyrics);
        }

        // 初始化播放列表
        function initPlaylist() {
            playlistUl.innerHTML = '';
            musicList.forEach((music, index) => {
                const li = document.createElement('li');
                li.className = index === currentIndex ? 'active' : '';
                li.innerHTML = `
                    <div class="song-info">
                        <span class="index">${index + 1}</span>
                        <div>
                            <div class="title">${music.name}</div>
                            <div class="artist">${music.artist}</div>
                        </div>
                    </div>
                    <span class="duration">${music.duration}</span>
                `;
                li.addEventListener('click', () => {
                    currentIndex = index;
                    loadMusic();
                    play();
                });
                playlistUl.appendChild(li);
            });
        }

        // 加载音乐
        function loadMusic() {
            const music = musicList[currentIndex];
            audio.src = music.url;
            coverImg.src = music.cover;
            songName.textContent = music.name;
            artistName.textContent = music.artist;

            // 更新播放列表高亮
            const items = playlistUl.querySelectorAll('li');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });

            // 渲染歌词
            renderLyrics();
        }

        // 播放
        function play() {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸';
                miniPlayBtn.textContent = '⏸';
                playerMini.classList.add('playing');
                playerCover.classList.add('playing');
            }).catch(err => {
                console.log('播放失败:', err);
            });
        }

        // 暂停
        function pause() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
            miniPlayBtn.textContent = '▶';
            playerMini.classList.remove('playing');
            playerCover.classList.remove('playing');
        }

        // 切换播放/暂停
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        // 上一首
        function prevSong() {
            if (playMode === 2) {
                currentIndex = Math.floor(Math.random() * musicList.length);
            } else {
                currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
            }
            loadMusic();
            if (isPlaying) play();
        }

        // 下一首
        function nextSong() {
            if (playMode === 2) {
                currentIndex = Math.floor(Math.random() * musicList.length);
            } else {
                currentIndex = (currentIndex + 1) % musicList.length;
            }
            loadMusic();
            if (isPlaying) play();
        }

        // 切换播放模式
        function toggleMode() {
            playMode = (playMode + 1) % 3;
            modeBtn.textContent = modeIcons[playMode];
            const modeNames = ['列表循环', '单曲循环', '随机播放'];
            modeBtn.title = modeNames[playMode];
        }

        // 设置音量
        function setVolume(volume) {
            currentVolume = Math.max(0, Math.min(1, volume));
            audio.volume = currentVolume;
            volumeBar.style.width = (currentVolume * 100) + '%';

            if (currentVolume === 0) {
                volumeBtn.textContent = '🔇';
            } else if (currentVolume < 0.5) {
                volumeBtn.textContent = '🔉';
            } else {
                volumeBtn.textContent = '🔊';
            }
        }

        // 静音切换
        function toggleMute() {
            if (isMuted) {
                setVolume(currentVolume || 0.7);
                isMuted = false;
            } else {
                audio.volume = 0;
                volumeBar.style.width = '0%';
                volumeBtn.textContent = '🔇';
                isMuted = true;
            }
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 切换展开/收起
        function toggleExpand() {
            isExpanded = !isExpanded;
            if (isExpanded) {
                playerFull.classList.add('show');
                playerMini.style.display = 'none';
                toggleBtn.textContent = '‹';
                toggleBtn.style.right = '-30px';
                toggleBtn.style.top = '24px';
                toggleBtn.style.transform = 'none';
            } else {
                playerFull.classList.remove('show');
                playerMini.style.display = 'block';
                toggleBtn.textContent = '›';
                toggleBtn.style.right = '-30px';
                toggleBtn.style.top = '50%';
                toggleBtn.style.transform = 'translateY(-50%)';
            }
        }

        // 切换播放列表显示
        function togglePlaylist() {
            playlist.classList.toggle('show');
        }

        // 事件监听
        playerMini.addEventListener('click', togglePlay);
        miniPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });

        toggleBtn.addEventListener('click', toggleExpand);
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        modeBtn.addEventListener('click', toggleMode);
        volumeBtn.addEventListener('click', toggleMute);
        playlistToggle.addEventListener('click', togglePlaylist);
        lyricsBtn.addEventListener('click', toggleLyrics);

        // 进度条点击
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        // 音量条点击
        volumeSlider.addEventListener('click', (e) => {
            const rect = volumeSlider.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            setVolume(percent);
            isMuted = false;
        });

        // 音频事件
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                
                // 更新歌词
                updateLyrics(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            if (playMode === 1) {
                // 单曲循环
                audio.currentTime = 0;
                play();
            } else {
                nextSong();
            }
        });

        audio.addEventListener('error', () => {
            console.log('音频加载失败，可能是链接失效');
        });

        // 樱花飘落效果
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.className = 'sakura';
            sakura.innerHTML = '🌸';
            sakura.style.left = Math.random() * 100 + 'vw';
            sakura.style.animationDuration = (Math.random() * 3 + 5) + 's';
            sakura.style.fontSize = (Math.random() * 10 + 10) + 'px';
            sakura.style.opacity = Math.random() * 0.6 + 0.4;
            document.body.appendChild(sakura);

            setTimeout(() => {
                sakura.remove();
            }, 8000);
        }

        setInterval(createSakura, 800);

        // 初始化
        initPlaylist();
        loadMusic();
        setVolume(0.7);

        // 暴露到全局方便调试
        window.player = {
            play,
            pause,
            togglePlay,
            prevSong,
            nextSong,
            toggleMode,
            toggleExpand,
            toggleLyrics,
            setVolume
        };
