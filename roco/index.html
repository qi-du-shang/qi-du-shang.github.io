        async function fetchMerchantData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const lastUpdate = document.getElementById('lastUpdate');
            const merchantContent = document.getElementById('merchantContent');
            const autoRefreshInfo = document.getElementById('autoRefreshInfo');
            
            // 清除之前的所有定时器
            if (dailyCountdownInterval) clearInterval(dailyCountdownInterval);
            if (roundCountdownInterval) clearInterval(roundCountdownInterval);
            if (autoRefreshTimeout) clearTimeout(autoRefreshTimeout);
            dailyCountdownInterval = null;
            roundCountdownInterval = null;
            autoRefreshTimeout = null;
            
            // 重置状态
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            result.classList.add('hidden');
            autoRefreshInfo.classList.add('hidden');
            merchantContent.innerHTML = '';
            currentProxyIndex = 0;
            
            try {
                let htmlText = await fetchWithProxy('https://wiki.lcx.cab/lk/index.php');
                
                // ==============================================
                // 第一步：彻底删除所有"计算中"文字
                // ==============================================
                htmlText = htmlText.replace(/计算中/g, '');
                htmlText = htmlText.replace(/{{#countdown:\d+\|?.*?}}/g, '');
                
                // ==============================================
                // 第二步：计算两个固定的结束时间
                // ==============================================
                const now = new Date();
                const currentHour = now.getHours();
                
                // 每日商品结束时间：当天24:00
                const dailyEndTime = new Date();
                dailyEndTime.setHours(24, 0, 0, 0);
                
                // 本轮限时商品结束时间
                let currentPeriod = null;
                for (const period of merchantSchedule) {
                    if (currentHour >= period.start && currentHour < period.end) {
                        currentPeriod = period;
                        break;
                    }
                }
                
                const roundEndTime = new Date();
                if (currentPeriod) {
                    roundEndTime.setHours(currentPeriod.end, 0, 0, 0);
                }
                
                // ==============================================
                // 第三步：解析商品信息
                // ==============================================
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // 提取基本信息
                let merchantInfo = {
                    date: '',
                    itemCount: 0,
                    round: '',
                    items: []
                };
                
                // 查找远行商人区块
                const merchantText = doc.body.textContent;
                
                // 提取日期
                const dateMatch = merchantText.match(/(\d{4}-\d{2}-\d{2})/);
                if (dateMatch) merchantInfo.date = dateMatch[1];
                
                // 提取商品数
                const countMatch = merchantText.match(/当前商品数\s*(\d+)/);
                if (countMatch) merchantInfo.itemCount = parseInt(countMatch[1]);
                
                // 提取轮次
                const roundMatch = merchantText.match(/第\s*(\d+)\s*\/\s*(\d+)\s*轮/);
                if (roundMatch) merchantInfo.round = `第 ${roundMatch[1]} / ${roundMatch[2]} 轮`;
                
                // 提取所有商品
                const itemPattern = /([^\d\n\s]+)\s*(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/g;
                let match;
                
                while ((match = itemPattern.exec(merchantText)) !== null) {
                    const itemName = match[1].trim();
                    const startTime = match[2];
                    const endTime = match[3];
                    
                    // 去重
                    if (!merchantInfo.items.some(item => item.name === itemName)) {
                        merchantInfo.items.push({
                            name: itemName,
                            startTime: startTime,
                            endTime: endTime,
                            image: officialItemImages[itemName] || ''
                        });
                    }
                }
                
                // ==============================================
                // 第四步：重新生成干净的商品列表
                // ==============================================
                let html = '';
                
                // 基本信息
                html += `
                    <div class="mb-6 pb-4 border-b border-gray-200">
                        <h4 class="text-xl font-bold text-gray-800 mb-2">远行商人</h4>
                        <p class="text-gray-600">日期：${merchantInfo.date || new Date().toLocaleDateString()}</p>
                        <p class="text-gray-600">当前商品数：${merchantInfo.itemCount || merchantInfo.items.length}</p>
                        <p class="text-gray-600">${merchantInfo.round || currentPeriod ? `${currentPeriod.name} ${currentPeriod.start}:00-${currentPeriod.end}:00` : ''}</p>
                    </div>
                `;
                
                // 商品列表
                html += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
                
                merchantInfo.items.forEach(item => {
                    html += `
                        <div class="bg-gray-50 rounded-xl p-4 border border-gray-200 hover:border-indigo-300 transition-colors">
                            <div class="flex flex-col items-center">
                                <div class="w-24 h-24 bg-white rounded-lg flex items-center justify-center mb-3 shadow-sm">
                                    ${item.image 
                                        ? `<img src="${item.image}" alt="${item.name}" class="max-w-full max-h-full object-contain" loading="lazy">`
                                        : `<div class="text-gray-400 text-center">${item.name}</div>`
                                    }
                                </div>
                                <h5 class="font-bold text-gray-800 text-lg mb-1">${item.name}</h5>
                                <p class="text-gray-500 text-sm">${item.startTime} - ${item.endTime}</p>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                
                // 提取精选攻略
                // extractGuides(doc);
                
                // 显示内容
                merchantContent.innerHTML = html;
                
                lastUpdate.textContent = `最后更新：${new Date().toLocaleTimeString()}`;
                lastUpdate.className = 'text-green-600 text-sm';
                
                // 启动两个固定的倒计时
                startDailyCountdown(dailyEndTime.getTime());
                
                if (currentPeriod) {
                    startRoundCountdown(roundEndTime.getTime());
                    document.getElementById('roundTime').textContent = `${currentPeriod.name} ${currentPeriod.start}:00-${currentPeriod.end}:00`;
                    
                    // 计算下一次自动刷新时间
                    const nextRefreshTime = Math.min(dailyEndTime.getTime(), roundEndTime.getTime());
                    const refreshDelay = nextRefreshTime - Date.now() + 1000; // 加1秒确保数据已更新
                    
                    // 设置自动刷新
                    autoRefreshTimeout = setTimeout(() => {
                        autoRefreshInfo.textContent = '倒计时结束，正在自动刷新...';
                        autoRefreshInfo.classList.remove('hidden');
                        fetchMerchantData();
                    }, refreshDelay);
                    
                    // 显示自动刷新提示
                    const minutes = Math.floor(refreshDelay / 60000);
                    const seconds = Math.floor((refreshDelay % 60000) / 1000);
                    autoRefreshInfo.textContent = `将在 ${minutes}分${seconds}秒 后自动刷新`;
                    autoRefreshInfo.classList.remove('hidden');
                    
                } else {
                    document.getElementById('roundCountdown').textContent = '商人已离开';
                    document.getElementById('roundCountdown').className = 'text-red-300 font-bold text-lg';
                    document.getElementById('roundTime').textContent = '每日8:00准时出现';
                    
                    // 设置第二天8:00自动刷新
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(8, 0, 0, 0);
                    const refreshDelay = tomorrow.getTime() - Date.now();
                    
                    autoRefreshTimeout = setTimeout(() => {
                        autoRefreshInfo.textContent = '商人已出现，正在自动刷新...';
                        autoRefreshInfo.classList.remove('hidden');
                        fetchMerchantData();
                    }, refreshDelay);
                }
                
                document.getElementById('timeSource').textContent = '使用官方固定规律 | 图片来自洛克王国世界官方CDN';
                result.classList.remove('hidden');
                
            } catch (err) {
                error.classList.remove('hidden');
                document.getElementById('errorMsg').textContent = err.message;
                lastUpdate.textContent = '获取失败';
                lastUpdate.className = 'text-red-600 text-sm';
                console.error('爬取错误:', err);
                
                // 失败后5分钟自动重试
                autoRefreshTimeout = setTimeout(() => {
                    fetchMerchantData();
                }, 5 * 60 * 1000);
                
                autoRefreshInfo.textContent = '获取失败，将在5分钟后自动重试';
                autoRefreshInfo.classList.remove('hidden');
                
            } finally {
                loading.classList.add('hidden');
            }
        }
        
        // 使用代理列表自动重试
        async function fetchWithProxy(url) {
            while (currentProxyIndex < corsProxies.length) {
                try {
                    const proxyUrl = corsProxies[currentProxyIndex] + encodeURIComponent(url);
                    const response = await fetch(proxyUrl, {
                        signal: AbortSignal.timeout(15000) // 15秒超时
                    });
                    
                    if (response.ok) {
                        return await response.text();
                    }
                } catch (e) {
                    console.log(`代理 ${corsProxies[currentProxyIndex]} 失败，尝试下一个...`);
                }
                currentProxyIndex++;
            }
            throw new Error('所有代理服务器都无法访问，请稍后再试');
        }
        
        // 每日商品倒计时
        function startDailyCountdown(endTime) {
            const countdownEl = document.getElementById('dailyCountdown');
            
            function updateCountdown() {
                const now = Date.now();
                const remaining = endTime - now;
                
                if (remaining <= 0) {
                    countdownEl.textContent = '今日已结束';
                    countdownEl.className = 'text-red-300 font-bold text-lg';
                    clearInterval(dailyCountdownInterval);
                    return;
                }
                
                const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
                
                countdownEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            updateCountdown();
            dailyCountdownInterval = setInterval(updateCountdown, 1000);
        }
        
        // 轮次商品倒计时
        function startRoundCountdown(endTime) {
            const countdownEl = document.getElementById('roundCountdown');
            
            function updateCountdown() {
                const now = Date.now();
                const remaining = endTime - now;
                
                if (remaining <= 0) {
                    countdownEl.textContent = '本轮已结束';
                    countdownEl.className = 'text-red-300 font-bold text-lg';
                    clearInterval(roundCountdownInterval);
                    return;
                }
                
                const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
                
                countdownEl.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            updateCountdown();
            roundCountdownInterval = setInterval(updateCountdown, 1000);
        }
