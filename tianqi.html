<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>免费天气查询</title>
  <style>
    :root {
      --bg: #1e293b;
      --card: rgba(15, 23, 42, 0.95);
      --text: #e2e8f0;
      --accent: #38bdf8;
      --muted: #94a3b8;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #334155 0%, #0f172a 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(100%, 980px);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.92));
      border: 1px solid rgba(148, 163, 184, 0.15);
      box-shadow: var(--shadow);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    header {
      padding: 30px 32px 24px;
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p.description {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .search-panel {
      display: grid;
      gap: 12px;
    }

    .search-panel label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .search-panel input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 1rem;
    }

    .search-panel button {
      width: fit-content;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #0f172a;
      font-weight: 700;
      padding: 14px 24px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .search-panel button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.35);
    }

    .content {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
      padding: 0 32px 32px;
    }

    .weather-card,
    .forecast-card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      min-height: 240px;
    }

    .weather-card {
      display: grid;
      gap: 20px;
    }

    .weather-meta {
      display: grid;
      gap: 12px;
    }

    .weather-meta strong {
      font-size: 1.05rem;
      color: var(--text);
    }

    .weather-summary {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .temperature {
      font-size: clamp(3rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
    }

    .description {
      color: var(--muted);
      font-size: 1rem;
    }

    .extra-info {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .info-item {
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.7);
    }

    .info-item span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .info-item strong {
      display: block;
      margin-top: 6px;
      font-size: 1.1rem;
      color: var(--text);
    }

    .forecast-card h2 {
      margin-top: 0;
      font-size: 1.3rem;
    }

    .forecast-list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .forecast-day {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.06);
    }

    .forecast-day span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .forecast-day strong {
      font-size: 1rem;
      color: var(--text);
    }

    .small-note {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .error {
      color: #fecaca;
      background: rgba(248, 113, 113, 0.14);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 16px;
      padding: 14px 18px;
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      header {
        padding: 22px 20px 18px;
      }

      .container {
        border-radius: 20px;
      }

      .search-panel input,
      .search-panel button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>免费天气查询</h1>
        <p class="description">输入城市名称获取最新天气。使用 Open-Meteo 免费 API，无需注册即可查看当前天气与 7 日预报。</p>
      </div>

      <form id="searchForm" class="search-panel">
        <label>
          城市名称
          <input id="cityInput" type="text" placeholder="例如：北京、Shanghai、New York" autocomplete="off" required />
        </label>
        <div>
          <button type="submit">查询天气</button>
        </div>
      </form>

      <div id="message"></div>
    </header>

    <main class="content">
      <section class="weather-card" id="currentWeather">
        <div class="weather-meta" id="weatherMeta">
          <strong>请输入城市后点击查询</strong>
        </div>
      </section>

      <section class="forecast-card" id="forecastSection">
        <h2>7 日预报</h2>
        <div class="forecast-list" id="forecastList">
          <p class="small-note">天气结果会显示在这里。</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const searchForm = document.getElementById('searchForm');
    const cityInput = document.getElementById('cityInput');
    const message = document.getElementById('message');
    const weatherMeta = document.getElementById('weatherMeta');
    const forecastList = document.getElementById('forecastList');

    const weatherCodeMap = {
      0: '晴朗',
      1: '主要晴朗',
      2: '多云',
      3: '阴',
      45: '雾霾',
      48: '霜雾',
      51: '轻微毛毛雨',
      53: '中等毛毛雨',
      55: '浓毛毛雨',
      56: '轻微冰雨',
      57: '浓冰雨',
      61: '小雨',
      63: '中雨',
      65: '大雨',
      66: '小冰雹',
      67: '大冰雹',
      71: '小雪',
      73: '中雪',
      75: '大雪',
      77: '雪粒',
      80: '阵雨',
      81: '强阵雨',
      82: '暴雨阵雨',
      85: '小阵雪',
      86: '大阵雪',
      95: '雷暴',
      96: '雷暴伴有小冰雹',
      99: '雷暴伴有大冰雹'
    };

    function showMessage(text, type = 'info') {
      message.innerHTML = `<div class="${type === 'error' ? 'error' : 'small-note'}">${text}</div>`;
    }

    function clearMessage() {
      message.innerHTML = '';
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric', weekday: 'short' });
    }

    function getWeatherDescription(code) {
      return weatherCodeMap[code] || '未知天气';
    }

    async function fetchCoordinates(city) {
      const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=5&language=zh&format=json`);
      if (!response.ok) {
        throw new Error('地理编码服务不可用');
      }
      const data = await response.json();
      if (!data.results || data.results.length === 0) {
        throw new Error('未找到该城市，请尝试其他名称');
      }
      return data.results[0];
    }

    async function fetchWeather(latitude, longitude, timezone) {
      const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=${encodeURIComponent(timezone)}&forecast_days=7`;
      const response = await fetch(apiUrl);
      if (!response.ok) {
        throw new Error('天气服务不可用');
      }
      return response.json();
    }

    function renderWeather(location, weather) {
      const current = weather.current_weather;
      const daily = weather.daily;
      weatherMeta.innerHTML = `
        <div>
          <strong>${location.name}${location.admin1 ? '，' + location.admin1 : ''}${location.country ? '，' + location.country : ''}</strong>
          <p class="description">当前：${getWeatherDescription(current.weathercode)}</p>
        </div>
        <div class="weather-summary">
          <div>
            <div class="temperature">${Math.round(current.temperature)}°C</div>
            <div class="description">风速 ${current.windspeed} km/h · 风向 ${current.winddirection}°</div>
          </div>
        </div>
        <div class="extra-info">
          <div class="info-item">
            <span>当前时间</span>
            <strong>${new Date(current.time).toLocaleString('zh-CN', { hour12: false })}</strong>
          </div>
          <div class="info-item">
            <span>温度范围</span>
            <strong>${Math.round(daily.temperature_2m_min[0])}°C / ${Math.round(daily.temperature_2m_max[0])}°C</strong>
          </div>
        </div>
      `;

      forecastList.innerHTML = daily.time.map((date, index) => {
        const weatherText = getWeatherDescription(daily.weathercode[index]);
        return `
          <div class="forecast-day">
            <div>
              <span>${formatDate(date)}</span>
              <strong>${weatherText}</strong>
            </div>
            <div style="text-align:right;">
              <span>高 ${Math.round(daily.temperature_2m_max[index])}°C</span><br />
              <span>低 ${Math.round(daily.temperature_2m_min[index])}°C</span>
            </div>
          </div>
        `;
      }).join('');
    }

    searchForm.addEventListener('submit', async event => {
      event.preventDefault();
      const city = cityInput.value.trim();
      if (!city) {
        showMessage('请输入城市名称', 'error');
        return;
      }
      clearMessage();
      weatherMeta.innerHTML = '<strong>正在加载天气数据...</strong>';
      forecastList.innerHTML = '<p class="small-note">请稍候，正在获取数据。</p>';

      try {
        const location = await fetchCoordinates(city);
        const weather = await fetchWeather(location.latitude, location.longitude, location.timezone || 'Asia/Shanghai');
        renderWeather(location, weather);
      } catch (error) {
        weatherMeta.innerHTML = '<strong>无法获取天气数据</strong>';
        forecastList.innerHTML = '<p class="small-note">请重试或检查网络连接。</p>';
        showMessage(error.message, 'error');
      }
    });
  </script>
</body>
</html>
